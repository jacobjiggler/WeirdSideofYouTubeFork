services:
  app:
    build: .
    restart: always
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — reached by cloudflared on this host, not the LAN/Tailscale/internet
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/weirdtube
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
    depends_on:
      - mongo
    volumes:
      - .:/app               # mount source so edits reflect without rebuild
      - /app/node_modules    # keep container's node_modules, don't overwrite with host

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "127.0.0.1:27017:27017"   # loopback only — reachable from this machine (Compass), not the LAN/internet
    volumes:
      - mongo_data:/data/db  # persist data across container restarts

volumes:
  mongo_data:
